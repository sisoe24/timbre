# ============================================================================
# Audio Analyzer — Experiment-Aware Configuration
# ============================================================================

# The base section holds the shared defaults for all runs.
# Named experiments below override only the keys they need.
default_experiment: "balanced"

base:
  # -------------------------------------------------------------------------
  # Model settings
  # -------------------------------------------------------------------------
  model:
    # HuggingFace model ID for CLAP
    model_id: "laion/larger_clap_general"

    # Device: "cuda", "mps", "cpu", or null (auto-detect)
    device: null

    # Use float16 to reduce memory usage.
    # Only applied on CUDA — disabled automatically on MPS and CPU.
    fp16: true

    # Vocabulary file (relative to this config file's directory).
    vocab_file: "vocabulary.yaml"

    # Path to the pre-computed label embedding cache (.pt file).
    # Resolved relative to the project root and fingerprinted by model+vocab.
    label_cache_path: ".cache/label_cache.pt"

  # -------------------------------------------------------------------------
  # Audio ingestion settings
  # -------------------------------------------------------------------------
  audio:
    target_sr: 48000
    supported_formats:
      - .wav
      - .mp3
      - .flac
      - .ogg
      - .aiff
      - .m4a

  # -------------------------------------------------------------------------
  # Analysis settings
  # -------------------------------------------------------------------------
  analysis:
    use_windowed_analysis: true
    windowed_min_duration: 2.0
    window_seconds: 2.0
    hop_seconds: 0.5
    min_confidence: 0.25
    top_k_categories: 5
    n_fft: 2048
    hop_length: 512
    silence_threshold_db: -50.0

  # -------------------------------------------------------------------------
  # Output settings
  # -------------------------------------------------------------------------
  output:
    output_dir: "./out"
    json_dir: "./out/json"
    csv_dir: "./out/csv"
    markdown_dir: "./out/markdown"
    catalog_markdown: "./out/catalog.md"
    catalog_csv: "./out/catalog.csv"
    batch_json: "./out/batch_results.json"
    validation_report: "./out/validation/validation_report.json"
    save_per_file_markdown: true
    full_json: false

  # -------------------------------------------------------------------------
  # UCS identity fields
  # -------------------------------------------------------------------------
  ucs:
    creator_id: "UNKNOWN"
    source_id: "NONE"
    user_data: ""

  # -------------------------------------------------------------------------
  # Logging
  # -------------------------------------------------------------------------
  logging:
    level: "INFO"
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    log_file: null

experiments:
  # Default baseline: good general balance between speed and detail.
  balanced: {}

  # Faster run for broad triage or large folders.
  fast:
    analysis:
      window_seconds: 2.5
      hop_seconds: 1.0
      top_k_categories: 3

  # Higher temporal resolution and broader category search.
  precise:
    analysis:
      window_seconds: 1.5
      hop_seconds: 0.25
      min_confidence: 0.20
      top_k_categories: 7

  # Conservative profile: fewer, higher-confidence labels.
  conservative:
    analysis:
      window_seconds: 2.5
      hop_seconds: 0.75
      min_confidence: 0.35
      top_k_categories: 4

  # Sensitive profile: higher recall, useful when CLAP is missing detail.
  sensitive:
    analysis:
      window_seconds: 1.5
      hop_seconds: 0.25
      min_confidence: 0.15
      top_k_categories: 8

  # Fine temporal segmentation for clips with multiple short events.
  micro_events:
    analysis:
      windowed_min_duration: 1.0
      window_seconds: 1.0
      hop_seconds: 0.20
      min_confidence: 0.18
      top_k_categories: 7

  # Broad category expansion for ambiguous material.
  broad_search:
    analysis:
      window_seconds: 2.0
      hop_seconds: 0.50
      min_confidence: 0.20
      top_k_categories: null

  # Full-clip only baseline to compare against windowed event detection.
  clip_only:
    analysis:
      use_windowed_analysis: false
      min_confidence: 0.25
      top_k_categories: 5

  # Smaller CLAP model baseline for speed/cost comparison.
  compact_model:
    model:
      model_id: "laion/clap-htsat-unfused"
    analysis:
      window_seconds: 2.0
      hop_seconds: 0.5
      min_confidence: 0.25
      top_k_categories: 5
