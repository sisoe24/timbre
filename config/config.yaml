# ============================================================================
# Audio Analyzer — Phase 1 Configuration
# ============================================================================

# ---------------------------------------------------------------------------
# Model settings
# ---------------------------------------------------------------------------
model:
  # HuggingFace model ID for CLAP
  # Options: "laion/larger_clap_general" (recommended, 630K pairs)
  #          "laion/clap-htsat-unfused"  (smaller, faster fallback)
  model_id: "laion/larger_clap_general"

  # Device: "cuda", "mps", "cpu", or null (auto-detect)
  # null = auto-detect: prefers cuda → mps (Apple Silicon) → cpu
  device: null

  # Use float16 to reduce memory usage.
  # Only applied on CUDA — disabled automatically on MPS and CPU.
  fp16: true

  # Vocabulary file (relative to this config file's directory).
  # vocabulary_refined.yaml  — 1,464 CLAP-optimised natural-language prompts
  #                            (~2 per subcategory; recommended for accuracy)
  # vocabulary.yaml          — 17,441 labels including UCS keyword synonyms
  #                            (original; kept as a reference / fallback)
  # Override on the CLI with: --vocab path/to/vocabulary.yaml
  vocab_file: "vocabulary_refined.yaml"

  # Path to the pre-computed label embedding cache (.pt file).
  # Built automatically on first run, or manually via:
  #   python scripts/build_label_cache.py
  # Delete this file and re-run to rebuild after changing the vocabulary.
  label_cache_path: "config/label_cache.pt"

# ---------------------------------------------------------------------------
# Audio ingestion settings
# ---------------------------------------------------------------------------
audio:
  # Sample rate CLAP expects (48000 Hz) — do not change unless using a
  # different model that expects a different rate
  target_sr: 48000

  # Supported file extensions (librosa handles conversion)
  supported_formats:
    - .wav
    - .mp3
    - .flac
    - .ogg
    - .aiff
    - .m4a

# ---------------------------------------------------------------------------
# Analysis settings
# ---------------------------------------------------------------------------
analysis:
  # Sliding window for temporal event detection
  use_windowed_analysis: true

  # Clips shorter than this (seconds) use full-clip analysis only
  windowed_min_duration: 2.0

  # CLAP sliding window size (seconds)
  window_seconds: 2.0

  # Sliding window hop (seconds) — smaller = finer temporal resolution
  hop_seconds: 0.5

  # Minimum CLAP confidence to record a detection (below = "background")
  min_confidence: 0.25

  # Acoustic feature extraction
  n_fft: 2048
  hop_length: 512
  silence_threshold_db: -50.0

# ---------------------------------------------------------------------------
# Output settings
# ---------------------------------------------------------------------------
output:
  # Root directory for all outputs
  output_dir: "./out"

  # Sub-directory structure
  json_dir: "./out/json"
  csv_dir: "./out/csv"
  markdown_dir: "./out/markdown"

  # Catalog file names
  catalog_markdown: "./out/catalog.md"
  catalog_csv: "./out/catalog.csv"
  batch_json: "./out/batch_results.json"

  # If true, save per-file Markdown report in addition to JSON
  save_per_file_markdown: true

  # If true, include full metadata in JSON (vs. spec-only brief format)
  full_json: false

# ---------------------------------------------------------------------------
# UCS (Universal Category System) identity fields
# ---------------------------------------------------------------------------
# These values are embedded into every analysis record and used to construct
# the suggested UCS-compliant filename for each analyzed file.
#
# Reference: universalcategorysystem.com
# ---------------------------------------------------------------------------
ucs:
  # Who recorded or designed the sounds (initials or short vendor code)
  # Example: "TN" (Tim Nielsen), "SB", "ACME"
  creator_id: "UNKNOWN"

  # Source library or project identifier
  # Example: "MyLibrary", "ProjectX", "NONE"
  source_id: "NONE"

  # Free-form user data appended to the suggested filename
  # Common uses: microphone type, perspective, unique ID
  # Example: "stereo", "mono", "closeup", "" (empty = omitted)
  user_data: ""

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"    # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  log_file: null   # set to a path to also write logs to a file
