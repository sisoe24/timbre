# ============================================================================
# Audio Analyzer — UCS (Universal Category System) Vocabulary
# Updated to UCS v8.2.1 Full List
# ============================================================================
#
# Structure
# ---------
#   categories:
#     <CATEGORY>:                  # UCS Category (uppercase)
#       <SUBCATEGORY>:             # UCS SubCategory (uppercase)
#         cat_id: <CatID>          # UCS CatID
#         labels:                  # CLAP zero-shot text labels
#           - "..."
#
# Guidelines
# ----------
# - Labels describe what is AUDIBLE — not the cause or context
# - Labels must be specific and unambiguous for zero-shot classification
# - No retraining required — CLAP is zero-shot
#
# Reference: Universal Category System v8.2.1 — universalcategorysystem.com
# ============================================================================

