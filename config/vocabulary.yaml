# ============================================================================
# Audio Analyzer — UCS (Universal Category System) Vocabulary
# ============================================================================
#
# This file defines the CLAP candidate labels mapped to UCS categories and
# subcategories. Each subcategory has:
#
#   cat_id  : UCS CatID (abbreviated Category + SubCategory)
#   labels  : CLAP zero-shot text labels for this subcategory
#
# Structure
# ---------
#   categories:
#     <CATEGORY>:                  # UCS Category (uppercase)
#       <SUBCATEGORY>:             # UCS SubCategory (uppercase)
#         cat_id: <CatID>          # UCS CatID abbreviation
#         labels:                  # CLAP text labels (what is AUDIBLE)
#           - "..."
#
# Guidelines
# ----------
# - Labels describe what is AUDIBLE — not the cause or context
# - Labels must be specific and unambiguous for zero-shot classification
# - Avoid labels that imply emotion, scene, or genre
# - Add new labels under the correct UCS subcategory
# - No retraining required — CLAP is zero-shot
#
# Reference: Universal Category System v8.2 — universalcategorysystem.com
# ============================================================================

